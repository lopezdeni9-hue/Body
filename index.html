<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Línea del Tiempo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f0f0f0;
  }

  /* ---- Contenedor externo para scroll ---- */
  .timeline-wrapper {
    overflow-x: auto;  /* scroll horizontal */
    max-width: 90vw;
    padding: 20px;
  }

  /* Estilo del scroll */
  .timeline-wrapper::-webkit-scrollbar {
    height: 8px;
  }
  .timeline-wrapper::-webkit-scrollbar-thumb {
    background: #aaa;
    border-radius: 4px;
  }
  .timeline-wrapper::-webkit-scrollbar-track {
    background: #f0f0f0;
  }

  /* ---- Línea del tiempo ---- */
  .timeline {
    display: flex;
    gap: 60px;  /* distancia entre números */
    position: relative;
  }

  .item {
    position: relative;
    cursor: pointer;
    font-size: 22px;
    font-weight: bold;
    color: #333;
    text-align: center;
    flex-shrink: 0;       /* no se compriman los items */
    padding-top: 250px;   /* espacio arriba para la imagen flotante */
  }

  /* Nombre debajo de la fecha */
  .item .name {
    font-size: 16px;
    color: #555;
    margin-top: 45px; /* separación debajo de la fecha */
    opacity: 0;
    transition: 0.3s;
  }

  /* Imagen flotante arriba */
  .preview {
    position: absolute;
    bottom: 120px; /* separación de la imagen */
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    text-align: center;
  }

  .preview img {
    width: 180px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  /* Mostrar imagen y nombre al hacer hover */
  .item:hover .preview {
    opacity: 1;
    bottom: 140px;
  }

  .item:hover .name {
    opacity: 1;
  }
</style>
</head>
